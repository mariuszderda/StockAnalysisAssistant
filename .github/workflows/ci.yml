name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # local.properties is gitignored; CI tworzy minimalny stub żeby AGP nie krzyczał o sdk.dir.
      # ANDROID_HOME w obrazie ubuntu-latest jest ustawiony przez akcję poniżej.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bootstrap local.properties
        run: |
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "TWELVE_DATA_API_KEY="
            echo "GEMINI_API_KEY="
          } > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Android Lint (debug)
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
